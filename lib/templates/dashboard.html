<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="lumen-dashboard-version" content="6"><title>Lumen</title>
<style>
:root{--paper:#f8f8f6;--ink:#171716;--muted:#74746f;--line:#e2e2de;--quiet:#f0f0ed;--orange:#ed6a18;--orange-soft:#fff1e8;--blue:#0877db;--blue-soft:#eaf3ff;--green:#137447;--green-soft:#eaf8ef;--red:#bb302b;--red-soft:#fff0ef;--radius:8px;--font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;--mono:"SF Mono",SFMono-Regular,Menlo,monospace}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font:14px/1.5 var(--font)}.shell{max-width:1240px;margin:auto;padding:30px 24px 64px}.masthead{display:flex;align-items:center;justify-content:space-between;gap:20px;padding-bottom:22px;border-bottom:1px solid var(--line)}.brand{display:flex;gap:13px;align-items:center}.brand img{width:44px;height:44px;border-radius:7px;object-fit:cover;background:#000}.brand h1{margin:0;font-size:21px;font-weight:650}.brand p,.meta{margin:2px 0 0;color:var(--muted);font-size:12px}.meta{text-align:right}.tabs{display:flex;gap:4px;padding:18px 0;border-bottom:1px solid var(--line);margin-bottom:24px;overflow:auto}.tabs button,.button{border:1px solid transparent;background:transparent;border-radius:6px;padding:7px 10px;color:var(--muted);font:600 12px var(--font);letter-spacing:.03em;cursor:pointer;white-space:nowrap}.tabs button.active,.tabs button:hover{color:var(--ink);background:var(--quiet)}.button{border-color:var(--line);color:var(--ink);letter-spacing:0;background:#fff}.button:hover{background:#fbfbfa;border-color:#c7c7c1}.button.primary{background:var(--ink);border-color:var(--ink);color:#fff}.button.danger{color:var(--red);border-color:#e9b8b4}.button.small{font-size:11px;padding:5px 8px}.view{display:none}.view.active{display:block}.intro{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin:0 0 16px}.intro h2{margin:0;font-size:17px}.intro p,.muted{margin:3px 0 0;color:var(--muted);font-size:12px}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));border:1px solid var(--line);border-radius:var(--radius);background:#fff;margin-bottom:18px}.metric{padding:16px;border-right:1px solid var(--line)}.metric:last-child{border:0}.eyebrow{font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);font-weight:650}.number{font-size:27px;font-weight:600;margin-top:4px}.panel{border:1px solid var(--line);background:#fff;border-radius:var(--radius);margin-bottom:18px;overflow:hidden}.head{padding:13px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px}.head h3{font-size:13px;margin:0}.body{padding:16px}.two{display:grid;grid-template-columns:1.3fr .7fr;gap:18px}.badge{display:inline-flex;border-radius:999px;padding:3px 8px;font-size:10px;font-weight:650;text-transform:capitalize}.badge.ok{background:var(--green-soft);color:var(--green)}.badge.failed,.badge.open{background:var(--red-soft);color:var(--red)}.badge.running{background:var(--blue-soft);color:var(--blue)}.badge.medium{background:var(--orange-soft);color:#a84d10}.badge.neutral{background:var(--quiet);color:var(--muted)}table{width:100%;border-collapse:collapse;font-size:12px}th{text-align:left;padding:8px;color:var(--muted);font-size:10px;letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--line)}td{padding:10px 8px;border-bottom:1px solid var(--line);vertical-align:top}tr:last-child td{border:0}.issue{padding:13px 0;border-bottom:1px solid var(--line)}.issue:last-child{border:0}.issue-top{display:flex;justify-content:space-between;gap:12px}.issue-title{font-weight:600}.detail{display:none;white-space:pre-wrap;color:var(--muted);font-size:12px;padding:10px 0}.issue.expanded .detail{display:block}.actions{display:flex;flex-wrap:wrap;align-items:center;gap:8px}.empty{padding:30px;text-align:center;color:var(--muted)}.field{display:grid;gap:5px;margin-bottom:12px}.field label{font-size:12px;font-weight:600}.field input,.field textarea{border:1px solid var(--line);border-radius:6px;padding:8px 9px;font:13px var(--font);color:var(--ink);background:#fff;width:100%}.field textarea{font-family:var(--mono);line-height:1.55;min-height:430px;resize:vertical}.field input:focus,.field textarea:focus{outline:2px solid #cce4ff;border-color:var(--blue)}.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.rule{height:1px;background:var(--line);margin:16px 0}.prompt-layout{display:grid;grid-template-columns:260px 1fr;min-height:545px}.prompt-list{border-right:1px solid var(--line);padding:9px}.prompt-group{font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);padding:9px 8px 3px}.prompt-item{display:block;border:0;background:transparent;width:100%;border-radius:5px;padding:8px;text-align:left;color:var(--ink);font:12px var(--font);cursor:pointer;overflow-wrap:anywhere}.prompt-item:hover,.prompt-item.active{background:var(--quiet)}.tag{font-size:10px;color:var(--orange);margin-left:5px}.row{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid var(--line)}.row:last-child{border:0}.row code{font:11px var(--mono);text-align:right;overflow-wrap:anywhere}.notice{position:fixed;right:20px;bottom:20px;background:#1d1d1b;color:#fff;padding:10px 12px;border-radius:7px;font-size:12px;opacity:0;transform:translateY(8px);transition:.18s;pointer-events:none}.notice.show{opacity:1;transform:none}a{color:var(--blue);text-decoration:none}@media(max-width:760px){.shell{padding:18px 14px}.meta{display:none}.grid,.two{grid-template-columns:1fr}.metric{border-right:0;border-bottom:1px solid var(--line)}.metric:last-child{border:0}.prompt-layout{grid-template-columns:1fr}.prompt-list{border-right:0;border-bottom:1px solid var(--line);max-height:190px;overflow:auto}.form-row{grid-template-columns:1fr}}
</style></head><body><main class="shell"><header class="masthead"><div class="brand"><img src="assets/lumen-mark.png" alt="Lumen abstract light mark"><div><h1>Lumen</h1><p id="subtitle">Local engineering control plane</p></div></div><div id="meta" class="meta">Loading…</div></header><nav class="tabs"><button class="active" data-view="scan">SCAN</button><button data-view="delivery">DELIVERY</button><button data-view="prompts">PROMPTS</button><button data-view="workspace">WORKSPACE</button></nav><section id="scan" class="view active"></section><section id="delivery" class="view"></section><section id="prompts" class="view"></section><section id="workspace" class="view"></section></main><div id="notice" class="notice"></div><script src="dashboard-data.js"></script><script>
(()=>{let data=window.DASHBOARD_DATA||{},selected=null;const $=q=>document.querySelector(q),esc=v=>String(v??'').replace(/[&<>\"]/g,x=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[x])),time=v=>{if(!v)return'—';const d=new Date(v);return isNaN(d)?esc(v):d.toLocaleString(undefined,{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})},toast=v=>{const n=$('#notice');n.textContent=v;n.classList.add('show');setTimeout(()=>n.classList.remove('show'),3000)},api=(u,o={})=>fetch(u,{headers:{'Content-Type':'application/json'},...o}).then(r=>r.json().then(v=>{if(!r.ok)throw Error(v.error||'Request failed');return v})),badge=v=>{v=String(v||'unknown');const c=/completed|clean|passed|resolved|synced/.test(v)?'ok':/failed/.test(v)?'failed':/progress|running/.test(v)?'running':/open/.test(v)?'open':/medium/.test(v)?'medium':'neutral';return`<span class="badge ${c}">${esc(v.replaceAll('_',' '))}</span>`};
function scanTable(runs){return runs.length?`<table><thead><tr><th>Finished</th><th>Status</th><th>Issues</th><th>Duration</th><th>Artifacts</th></tr></thead><tbody>${runs.slice(0,10).map(r=>`<tr><td>${time(r.finished_at||r.started_at)}</td><td>${badge(r.status)}</td><td>${(r.high||0)+(r.medium||0)+(r.low||0)}</td><td>${esc(r.duration||'—')}</td><td>${[r.html&&`<a target="_blank" href="${esc(r.html)}">HTML</a>`,r.pdf&&`<a target="_blank" href="${esc(r.pdf)}">PDF</a>`].filter(Boolean).join(' · ')||'—'}</td></tr>`).join('')}</tbody></table>`:'<div class="empty">No scan records yet.</div>'}
function renderScan(){const s=data.run_stats||{},issues=data.issues||[],schedule=data.interactive?.schedules?.scan;$('#scan').innerHTML=`<div class="intro"><div><h2>SCAN</h2><p>Review history, tracked findings, and recurring scan control.</p></div>${badge(data.active_run?'running':'idle')}</div><div class="grid"><div class="metric"><div class="eyebrow">Open findings</div><div class="number">${data.issue_counts?.open||0}</div></div><div class="metric"><div class="eyebrow">Successful · 7d</div><div class="number">${s.success_7d||0}</div></div><div class="metric"><div class="eyebrow">Failed · 7d</div><div class="number">${s.failed_7d||0}</div></div><div class="metric"><div class="eyebrow">Lookback window</div><div class="number">${data.scan_window_days||7}d</div></div></div><div class="two"><div class="panel"><div class="head"><h3>Scan history</h3></div><div class="body">${scanTable(data.runs||[])}</div></div><div class="panel"><div class="head"><h3>Recurring scan</h3>${badge(schedule?'configured':'not configured')}</div><div class="body"><div class="field"><label>Five-field cron</label><input id="scan-cron" value="${esc(schedule?.cron||'0 9 * * 1-5')}"></div><div class="muted">${esc(schedule?.description||'No schedule configured')}</div><div class="actions" style="margin-top:12px"><button class="button primary" data-action="save-scan">Save</button>${schedule?'<button class="button danger" data-action="remove-scan">Remove</button>':''}</div></div></div></div><div class="panel"><div class="head"><h3>Tracked findings</h3><span class="muted">${issues.length} records</span></div><div class="body">${issues.length?issues.map(i=>`<article class="issue"><div class="issue-top"><div><div class="issue-title">${esc(i.title)}</div><div class="muted">${esc(i.repository)} · ${esc(i.file||'No file')} · ${time(i.last_seen_at)}</div></div><div class="actions">${badge(i.status)}${!['ignored','resolved'].includes(i.status)?`<button class="button small" data-ignore="${esc(i.id)}">Ignore</button>`:''}</div></div><div class="detail">${i.impact?`Impact\n${esc(i.impact)}\n\n`:''}${i.suggestion?`Suggested correction\n${esc(i.suggestion)}`:'No additional detail recorded.'}</div><button class="button small" data-detail>Details</button></article>`).join(''):'<div class="empty">No tracked findings.</div>'}</div></div>`}
function deliveryTable(runs){return runs.length?`<table><thead><tr><th>Story</th><th>Finished</th><th>Status</th><th>Pull requests</th><th>Verification</th></tr></thead><tbody>${runs.map(r=>{const checks=r.verification||[],passed=checks.filter(x=>x.status==='passed').length;return`<tr><td><strong>${esc(r.jira_key||r.story||r.run_id)}</strong><div class="muted">${esc(r.branch||'')}</div></td><td>${time(r.finished_at||r.started_at)}</td><td>${badge(r.status)}</td><td>${(r.prs||[]).map(u=>`<a target="_blank" href="${esc(u)}">PR</a>`).join(' · ')||'—'}</td><td>${passed}/${checks.length} passed</td></tr>`}).join('')}</tbody></table>`:'<div class="empty">No delivery history yet.</div>'}
function renderDelivery(){const d=data.delivery||{},c=d.current||{},runs=d.runs||[],schedule=data.interactive?.schedules?.delivery,checks=c.verification||[];$('#delivery').innerHTML=`<div class="intro"><div><h2>DELIVERY</h2><p>Story execution, verification evidence, pull requests, and delivery polling.</p></div>${badge(c.delivery_status||'idle')}</div><div class="two"><div class="panel"><div class="head"><h3>Current delivery</h3>${badge(c.delivery_status||'not started')}</div><div class="body"><div class="row"><span>Story</span><code>${esc(c.story_id||'—')}</code></div><div class="row"><span>Phase</span><code>${esc(c.current_phase||'—')}</code></div><div class="row"><span>Branch</span><code>${esc(c.branch||'—')}</code></div><div class="row"><span>Verification</span><code>${checks.filter(x=>x.status==='passed').length}/${checks.length} passed</code></div></div></div><div class="panel"><div class="head"><h3>Delivery polling</h3>${badge(schedule?'configured':'not configured')}</div><div class="body"><div class="form-row"><div class="field"><label>Interval, minutes</label><input id="delivery-interval" type="number" min="1" value="${Math.round((schedule?.interval_seconds||300)/60)}"></div><div class="field"><label>Eligible JIRA status</label><input id="delivery-status" value="Ready for Dev"></div></div><div class="actions"><button class="button primary" data-action="save-delivery">Save</button>${schedule?'<button class="button danger" data-action="remove-delivery">Remove</button>':''}</div></div></div></div><div class="panel"><div class="head"><h3>Delivery history</h3><span class="muted">${runs.length} runs</span></div><div class="body">${deliveryTable(runs)}</div></div>`}
function renderPrompts(){const groups={scan:[],delivery:[]};(data.interactive?.prompts||[]).forEach(p=>groups[p.mode].push(p));const list=m=>`<div class="prompt-group">${m}</div>${groups[m].map(p=>{const key=`${p.mode}/${p.path}`;return`<button class="prompt-item ${selected?.key===key?'active':''}" data-prompt="${esc(key)}">${esc(p.path)}${p.path==='coding-guideline.md'?'<span class="tag">STANDARD</span>':''}</button>`}).join('')}`;const edit=selected?`<div class="head"><h3>${esc(selected.path)}</h3><button class="button primary" data-action="save-prompt">Save</button></div><div class="body"><p class="muted">The delivery coding guideline is workspace-specific and included in every delivery Agent prompt.</p><div class="field"><textarea id="prompt-content" spellcheck="false">Loading…</textarea></div></div>`:'<div class="empty">Select a scan or delivery prompt fragment.</div>';$('#prompts').innerHTML=`<div class="intro"><div><h2>PROMPTS</h2><p>Local, versionable instructions for scan and delivery agents.</p></div></div><div class="panel"><div class="prompt-layout"><aside class="prompt-list">${list('scan')}${list('delivery')}</aside><section>${edit}</section></div></div>`}
function renderWorkspace(){const w=data.interactive?.workspace||{},repos=w.repositories||[];$('#workspace').innerHTML=`<div class="intro"><div><h2>WORKSPACE</h2><p>Shared local configuration and repository inventory.</p></div></div><div class="two"><div class="panel"><div class="head"><h3>Configuration</h3></div><div class="body"><div class="field"><label>Scan lookback, days</label><input id="scan-window" type="number" min="1" max="365" value="${w.scan_window_days||7}"></div><button class="button primary" data-action="save-workspace">Save configuration</button><div class="rule"></div><div class="row"><span>Workspace</span><code>${esc(w.path||'—')}</code></div><div class="row"><span>Integration keys</span><code>${esc((w.configured_integrations||[]).join(', ')||'None')}</code></div></div></div><div class="panel"><div class="head"><h3>Repositories</h3><span class="muted">${repos.length}</span></div><div class="body">${repos.map(r=>`<div class="row"><strong>${esc(r.name||r.path)}</strong><code>${esc(r.runtime_profile||'—')}</code></div>`).join('')||'<div class="empty">No repositories configured.</div>'}</div></div></div>`}
function render(){const p=data.project?.display_name||'Workspace';$('#subtitle').textContent=data.product?.tagline||'Local engineering control plane';$('#meta').innerHTML=`<strong>${esc(p)}</strong><br>Updated ${time(data.generated_at)}`;renderScan();renderDelivery();renderPrompts();renderWorkspace()}function refresh(){return api('/api/state').then(v=>{data=v;render()}).catch(e=>toast(e.message))}
document.addEventListener('click',e=>{const tab=e.target.closest('[data-view]');if(tab){document.querySelectorAll('.tabs button').forEach(x=>x.classList.toggle('active',x===tab));document.querySelectorAll('.view').forEach(x=>x.classList.toggle('active',x.id===tab.dataset.view));return}const p=e.target.closest('[data-prompt]');if(p){const parts=p.dataset.prompt.split('/');selected={mode:parts.shift(),path:parts.join('/'),key:p.dataset.prompt};renderPrompts();api(`/api/prompt?mode=${encodeURIComponent(selected.mode)}&path=${encodeURIComponent(selected.path)}`).then(v=>$('#prompt-content').value=v.content).catch(e=>toast(e.message));return}if(e.target.closest('[data-detail]')){e.target.closest('.issue').classList.toggle('expanded');return}const ignore=e.target.closest('[data-ignore]');if(ignore){const reason=prompt('Optional reason for ignoring this finding:','');if(reason!==null)api('/api/issue/ignore',{method:'POST',body:JSON.stringify({issue_id:ignore.dataset.ignore,reason})}).then(()=>{toast('Issue ignored');refresh()});return}const a=e.target.closest('[data-action]')?.dataset.action;if(!a)return;if(a==='save-scan')api('/api/schedule',{method:'POST',body:JSON.stringify({kind:'scan',action:'save',cron:$('#scan-cron').value})}).then(()=>{toast('Scan schedule saved');refresh()});if(a==='remove-scan'&&confirm('Remove this local scan schedule?'))api('/api/schedule',{method:'POST',body:JSON.stringify({kind:'scan',action:'remove'})}).then(()=>{toast('Scan schedule removed');refresh()});if(a==='save-delivery')api('/api/schedule',{method:'POST',body:JSON.stringify({kind:'delivery',action:'save',interval_minutes:$('#delivery-interval').value,jira_status:$('#delivery-status').value})}).then(()=>{toast('Delivery schedule saved');refresh()});if(a==='remove-delivery'&&confirm('Remove this local delivery schedule?'))api('/api/schedule',{method:'POST',body:JSON.stringify({kind:'delivery',action:'remove'})}).then(()=>{toast('Delivery schedule removed');refresh()});if(a==='save-workspace')api('/api/workspace',{method:'POST',body:JSON.stringify({scan_window_days:$('#scan-window').value})}).then(()=>{toast('Workspace configuration saved');refresh()});if(a==='save-prompt'&&selected)api('/api/prompt',{method:'POST',body:JSON.stringify({mode:selected.mode,path:selected.path,content:$('#prompt-content').value})}).then(()=>toast('Prompt saved'))});render();refresh();if(data.active_run)setInterval(refresh,30000)})();
</script></body></html>
