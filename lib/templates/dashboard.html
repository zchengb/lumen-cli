<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="lumen-dashboard-version" content="5" />
  <title>Lumen Control</title>
  <style>
    :root { --paper:#fbfbfa; --ink:#171716; --muted:#73736d; --line:#e5e5e1; --soft:#f3f3f0; --blue:#0674e8; --blue-soft:#eaf3ff; --red:#c52929; --red-soft:#fff0ef; --green:#167647; --green-soft:#ecf8f0; --amber:#9b6414; --amber-soft:#fff7e8; --radius:8px; --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif; --mono:"SF Mono",SFMono-Regular,Menlo,monospace; }
    *{box-sizing:border-box} body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--font);font-size:14px;line-height:1.5}.shell{max-width:1280px;margin:0 auto;padding:28px 24px 64px}.masthead{display:flex;justify-content:space-between;gap:24px;align-items:flex-start;border-bottom:1px solid var(--line);padding-bottom:18px}.brand{display:flex;align-items:center;gap:12px}.mark{width:30px;height:30px;border:1px solid var(--ink);border-radius:50%;display:grid;place-items:center;font:600 14px var(--mono)}h1{font-size:20px;margin:0;font-weight:650;letter-spacing:0}.subtitle,.meta{color:var(--muted);font-size:12px}.meta{text-align:right}.tabs{display:flex;gap:3px;padding:18px 0 22px;border-bottom:1px solid var(--line);margin-bottom:24px;overflow:auto}.tabs button,.button{appearance:none;border:1px solid transparent;background:transparent;color:var(--muted);font:600 13px var(--font);padding:7px 10px;border-radius:6px;cursor:pointer;white-space:nowrap}.tabs button:hover,.tabs button.active{background:var(--soft);color:var(--ink)}.button{border-color:var(--line);background:white;color:var(--ink)}.button:hover{border-color:#c6c6c0;background:#fcfcfb}.button.primary{border-color:var(--blue);background:var(--blue);color:white}.button.danger{border-color:#eab6b2;color:var(--red);background:white}.button.small{font-size:12px;padding:5px 8px}.view{display:none}.view.active{display:block}.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:0;border:1px solid var(--line);border-radius:var(--radius);background:white;margin-bottom:18px}.stat{padding:16px;border-right:1px solid var(--line)}.stat:last-child{border:0}.eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:650}.number{font-size:28px;font-weight:600;line-height:1.15;margin-top:5px;font-variant-numeric:tabular-nums}.panel{border:1px solid var(--line);border-radius:var(--radius);background:white;margin-bottom:18px}.panel-head{padding:13px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:12px}.panel h2{font-size:14px;margin:0;font-weight:650}.panel-body{padding:16px}.split{display:grid;grid-template-columns:1.25fr .75fr;gap:18px}.quiet{color:var(--muted);font-size:13px}.status{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:650}.status.open{background:var(--red-soft);color:var(--red)}.status.ignored,.status.neutral{background:var(--soft);color:var(--muted)}.status.ok,.status.resolved{background:var(--green-soft);color:var(--green)}.status.running{background:var(--blue-soft);color:var(--blue)}.status.medium{background:var(--amber-soft);color:var(--amber)}table{border-collapse:collapse;width:100%;font-size:13px}th{text-align:left;padding:9px 8px;color:var(--muted);font-size:10px;letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--line)}td{padding:11px 8px;border-bottom:1px solid var(--line);vertical-align:top}tr:last-child td{border-bottom:0}a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}.issue{border-bottom:1px solid var(--line);padding:14px 0}.issue:first-child{padding-top:0}.issue:last-child{border:0;padding-bottom:0}.issue-top{display:flex;gap:10px;justify-content:space-between}.issue-title{font-weight:600}.issue-meta{color:var(--muted);font-size:12px;margin-top:3px}.issue-detail{display:none;color:var(--muted);font-size:13px;padding-top:10px;white-space:pre-wrap}.issue.expanded .issue-detail{display:block}.actions{display:flex;flex-wrap:wrap;gap:8px;align-items:center}.field{display:grid;gap:5px;margin-bottom:12px}.field label{font-size:12px;font-weight:600}.field input,.field select,.field textarea{width:100%;font:13px var(--font);color:var(--ink);background:white;border:1px solid var(--line);border-radius:6px;padding:8px 9px}.field textarea{font-family:var(--mono);line-height:1.55;min-height:420px;resize:vertical}.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid #b9d9ff;outline-offset:1px;border-color:var(--blue)}.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.divider{height:1px;background:var(--line);margin:16px 0}.repo-list{display:grid;gap:0}.repo{padding:12px 0;border-bottom:1px solid var(--line)}.repo:last-child{border:0}.repo-name{font-weight:600}.repo-meta{font-family:var(--mono);font-size:11px;color:var(--muted);overflow-wrap:anywhere;margin-top:3px}.prompt-layout{display:grid;grid-template-columns:250px 1fr;min-height:530px}.prompt-list{border-right:1px solid var(--line);padding:8px}.prompt-item{width:100%;border:0;background:transparent;text-align:left;padding:8px;border-radius:5px;cursor:pointer;color:var(--ink);font:12px var(--font);overflow-wrap:anywhere}.prompt-item:hover,.prompt-item.active{background:var(--soft)}.mode-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:10px 8px 4px}.notice{position:fixed;right:20px;bottom:20px;max-width:360px;padding:11px 13px;background:#20201e;color:white;border-radius:7px;font-size:13px;box-shadow:0 8px 28px rgba(0,0,0,.15);opacity:0;transform:translateY(8px);transition:.18s;pointer-events:none}.notice.show{opacity:1;transform:none}.empty{padding:28px 8px;color:var(--muted);text-align:center}.detail-row{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid var(--line)}.detail-row:last-child{border:0}.detail-row span:last-child{font-family:var(--mono);font-size:12px;text-align:right;overflow-wrap:anywhere}.warning{border-left:3px solid var(--amber);padding:10px 12px;background:var(--amber-soft);font-size:13px}.hidden{display:none}@media(max-width:800px){.shell{padding:18px 14px}.masthead{display:block}.meta{text-align:left;margin-top:8px}.stats,.split{grid-template-columns:1fr}.stat{border-right:0;border-bottom:1px solid var(--line)}.stat:last-child{border-bottom:0}.prompt-layout{grid-template-columns:1fr}.prompt-list{border-right:0;border-bottom:1px solid var(--line);max-height:180px;overflow:auto}.form-row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="shell">
    <header class="masthead"><div class="brand"><div class="mark">L</div><div><h1>Lumen Control</h1><div class="subtitle" id="subtitle">Local delivery and quality control plane</div></div></div><div class="meta" id="meta">Loading workspace…</div></header>
    <nav class="tabs" aria-label="Dashboard sections"><button class="active" data-view="overview">Overview</button><button data-view="issues">Issues</button><button data-view="schedules">Schedules</button><button data-view="prompts">Prompts</button><button data-view="workspace">Workspace</button></nav>
    <section class="view active" id="view-overview"></section><section class="view" id="view-issues"></section><section class="view" id="view-schedules"></section><section class="view" id="view-prompts"></section><section class="view" id="view-workspace"></section>
  </main><div class="notice" id="notice"></div>
  <script src="dashboard-data.js"></script>
  <script>
  (function(){
    var data=window.DASHBOARD_DATA||null, selectedPrompt=null;
    var $=function(q){return document.querySelector(q)}, esc=function(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')};
    function time(v){if(!v)return '—';var d=new Date(v);return isNaN(d)?esc(v):d.toLocaleString(undefined,{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}
    function notice(msg){var n=$('#notice');n.textContent=msg;n.classList.add('show');setTimeout(function(){n.classList.remove('show')},3200)}
    function api(path,options){return fetch(path,Object.assign({headers:{'Content-Type':'application/json'}},options||{})).then(function(r){return r.json().then(function(v){if(!r.ok)throw new Error(v.error||'Request failed');return v})})}
    function status(v){v=String(v||'unknown');var c=/completed|clean|passed|resolved|synced/.test(v)?'ok':/failed/.test(v)?'open':/progress|running/.test(v)?'running':/medium/.test(v)?'medium':'neutral';return '<span class="status '+c+'">'+esc(v.replace(/_/g,' '))+'</span>'}
    function issueStatus(v){return '<span class="status '+(v==='open'?'open':v==='ignored'?'ignored':v==='resolved'?'resolved':'neutral')+'">'+esc(String(v||'unknown').replace(/_/g,' '))+'</span>'}
    function renderMeta(){var p=(data.project||{}).display_name||'Workspace';$('#subtitle').textContent=(data.product||{}).tagline||'Local delivery and quality control plane';$('#meta').innerHTML='<strong>'+esc(p)+'</strong><br>Updated '+time(data.generated_at)}
    function renderOverview(){var stats=data.run_stats||{}, active=data.active_run, latest=data.latest_run||{};$('#view-overview').innerHTML='<div class="stats"><div class="stat"><div class="eyebrow">Open issues</div><div class="number">'+((data.issue_counts||{}).open||0)+'</div></div><div class="stat"><div class="eyebrow">Successful · 7d</div><div class="number">'+(stats.success_7d||0)+'</div></div><div class="stat"><div class="eyebrow">Failed · 7d</div><div class="number">'+(stats.failed_7d||0)+'</div></div><div class="stat"><div class="eyebrow">Scan window</div><div class="number">'+esc(data.scan_window_days||7)+'d</div></div></div><div class="split"><div class="panel"><div class="panel-head"><h2>Latest scan</h2>'+status(active?'running':latest.status)+'</div><div class="panel-body"><div class="detail-row"><span>Finished</span><span>'+time(latest.finished_at)+'</span></div><div class="detail-row"><span>Findings</span><span>'+((latest.findings||[]).length||0)+'</span></div><div class="detail-row"><span>Activity</span><span>'+(active?'Running · '+esc(active.phase||''):'Idle')+'</span></div></div></div><div class="panel"><div class="panel-head"><h2>Control surface</h2></div><div class="panel-body"><p class="quiet">Issue decisions, recurring automation, editable agent prompts, and workspace settings are available locally.</p><div class="actions"><button class="button" data-go="issues">Review issues</button><button class="button" data-go="schedules">Manage schedules</button></div></div></div></div><div class="panel"><div class="panel-head"><h2>Recent runs</h2></div><div class="panel-body">'+runTable(data.runs||[])+'</div></div>'}
    function runTable(runs){if(!runs.length)return '<div class="empty">No scan history yet.</div>';return '<table><thead><tr><th>Finished</th><th>Status</th><th>Findings</th><th>Duration</th><th>Artifacts</th></tr></thead><tbody>'+runs.slice(0,8).map(function(r){var a=[];if(r.html)a.push('<a href="'+esc(r.html)+'" target="_blank">HTML</a>');if(r.pdf)a.push('<a href="'+esc(r.pdf)+'" target="_blank">PDF</a>');return '<tr><td>'+time(r.finished_at||r.started_at)+'</td><td>'+status(r.status)+'</td><td>'+((r.high||0)+(r.medium||0)+(r.low||0))+'</td><td>'+esc(r.duration||'—')+'</td><td>'+ (a.join(' · ')||'—')+'</td></tr>'}).join('')+'</tbody></table>'}
    function renderIssues(){var issues=data.issues||[];$('#view-issues').innerHTML='<div class="panel"><div class="panel-head"><h2>Tracked issues</h2><div class="quiet">'+issues.length+' records</div></div><div class="panel-body"><div class="warning">Ignoring a finding changes only Lumen’s local issue registry. It does not alter source code, scan history, or a remote tracker.</div><div class="divider"></div>'+ (issues.length?issues.map(function(i){return '<article class="issue" data-issue="'+esc(i.id)+'"><div class="issue-top"><div><div class="issue-title">'+esc(i.title)+'</div><div class="issue-meta">'+esc(i.repository)+' · '+esc(i.file||'No file')+' · last seen '+time(i.last_seen_at)+'</div></div><div class="actions">'+issueStatus(i.status)+(i.status!=='ignored'&&i.status!=='resolved'?'<button class="button small ignore" data-issue="'+esc(i.id)+'">Ignore</button>':'')+'</div></div><div class="issue-detail">'+(i.impact?'<strong>Impact</strong>\n'+esc(i.impact)+'\n\n':'')+(i.suggestion?'<strong>Suggestion</strong>\n'+esc(i.suggestion):'No additional detail recorded.')+'</div><button class="button small detail-toggle" data-issue="'+esc(i.id)+'">Details</button></article>'}).join(''):'<div class="empty">No tracked issues.</div>')+'</div></div>'}
    function scheduleRow(kind,current,body){var enabled=!!current;return '<div class="panel"><div class="panel-head"><h2>'+kind+'</h2>'+status(enabled?'configured':'not configured')+'</div><div class="panel-body">'+body+(enabled?'<div class="divider"></div><div class="detail-row"><span>LaunchAgent</span><span>'+esc(current.path||'—')+'</span></div><div class="actions" style="margin-top:12px"><button class="button danger remove-schedule" data-kind="'+kind.toLowerCase()+'">Remove schedule</button></div>':'')+'</div></div>'}
    function renderSchedules(){var s=(data.interactive||{}).schedules||{}, scan=s.scan, delivery=s.delivery;var scanBody='<div class="field"><label for="scan-cron">Scan schedule (five-field cron)</label><input id="scan-cron" value="'+esc(scan&&scan.cron||'0 12 * * 1-5')+'" placeholder="0 12 * * 1-5"></div><div class="actions"><button class="button primary save-scan">Save scan schedule</button><span class="quiet">Examples: weekdays at noon: <code>0 12 * * 1-5</code>; every 6 hours: <code>0 */6 * * *</code>.</span></div>';var deliveryBody='<div class="form-row"><div class="field"><label for="delivery-interval">Polling interval (minutes)</label><input id="delivery-interval" type="number" min="1" value="'+esc(delivery&&Math.round((delivery.interval_seconds||300)/60)||5)+'"></div><div class="field"><label for="delivery-status">Eligible JIRA status</label><input id="delivery-status" value="Ready for Dev"></div></div><div class="actions"><button class="button primary save-delivery">Save delivery schedule</button><span class="quiet">Delivery only starts stories that pass its existing docs and JIRA gates.</span></div>';$('#view-schedules').innerHTML='<div class="split">'+scheduleRow('Scan',scan,scanBody)+scheduleRow('Delivery',delivery,deliveryBody)+'</div><p class="quiet">Schedules are installed as user-level launchd agents on this Mac. They use the same Lumen commands and local workspace state as manual runs.</p>'}
    function renderPrompts(){var prompts=(data.interactive||{}).prompts||[];var by={scan:[],delivery:[]};prompts.forEach(function(p){(by[p.mode]||[]).push(p)});var list=function(mode){return '<div class="mode-label">'+mode+'</div>'+by[mode].map(function(p){var key=p.mode+'/'+p.path;return '<button class="prompt-item '+(selectedPrompt&&selectedPrompt.key===key?'active':'')+'" data-prompt="'+esc(key)+'">'+esc(p.path)+'</button>'}).join('')};var editor=selectedPrompt?'<div class="panel-head"><h2>'+esc(selectedPrompt.path)+'</h2><button class="button primary save-prompt">Save prompt</button></div><div class="panel-body"><div class="quiet" style="margin-bottom:10px">Changes are local to this workspace and affect only the selected '+esc(selectedPrompt.mode)+' workflow.</div><div class="field"><textarea id="prompt-content" spellcheck="false">Loading…</textarea></div></div>':'<div class="empty">Select a prompt fragment to inspect or adjust it.</div>';$('#view-prompts').innerHTML='<div class="panel"><div class="prompt-layout"><aside class="prompt-list">'+list('scan')+list('delivery')+'</aside><section id="prompt-editor">'+editor+'</section></div></div>'}
    function renderWorkspace(){var w=(data.interactive||{}).workspace||{}, repos=w.repositories||[];$('#view-workspace').innerHTML='<div class="split"><div class="panel"><div class="panel-head"><h2>Workspace configuration</h2></div><div class="panel-body"><div class="field"><label for="scan-window">Scan lookback window (days)</label><input id="scan-window" type="number" min="1" max="365" value="'+esc(w.scan_window_days||7)+'"></div><div class="actions"><button class="button primary save-workspace">Save configuration</button></div><div class="divider"></div><div class="detail-row"><span>Workspace</span><span>'+esc(w.path||data.workspace_root||'—')+'</span></div><div class="detail-row"><span>Configured integration keys</span><span>'+esc((w.configured_integrations||[]).join(', ')||'None')+'</span></div></div></div><div class="panel"><div class="panel-head"><h2>Repositories</h2><span class="quiet">'+repos.length+'</span></div><div class="panel-body repo-list">'+(repos.length?repos.map(function(r){return '<div class="repo"><div class="repo-name">'+esc(r.name||r.path||'Repository')+'</div><div class="repo-meta">'+esc(r.path||r.clone_url||'')+'</div></div>'}).join(''):'<div class="empty">No repositories configured.</div>')+'</div></div></div>'}
    function renderAll(){renderMeta();renderOverview();renderIssues();renderSchedules();renderPrompts();renderWorkspace()}
    function refresh(){return api('/api/state').then(function(v){data=v;renderAll();return v}).catch(function(e){notice(e.message)})}
    document.addEventListener('click',function(e){var tab=e.target.closest('[data-view]');if(tab){document.querySelectorAll('.tabs button').forEach(function(b){b.classList.toggle('active',b===tab)});document.querySelectorAll('.view').forEach(function(v){v.classList.toggle('active',v.id==='view-'+tab.dataset.view)});return}var go=e.target.closest('[data-go]');if(go){document.querySelector('[data-view="'+go.dataset.go+'"]').click();return}var toggle=e.target.closest('.detail-toggle');if(toggle){toggle.closest('.issue').classList.toggle('expanded');return}var ignore=e.target.closest('.ignore');if(ignore){var reason=window.prompt('Optional reason for ignoring this finding:','');if(reason===null)return;api('/api/issue/ignore',{method:'POST',body:JSON.stringify({issue_id:ignore.dataset.issue,reason:reason})}).then(function(){notice('Issue ignored');return refresh()});return}var rm=e.target.closest('.remove-schedule');if(rm&&window.confirm('Remove this local schedule?')){api('/api/schedule',{method:'POST',body:JSON.stringify({kind:rm.dataset.kind,action:'remove'})}).then(function(){notice('Schedule removed');return refresh()});return}if(e.target.closest('.save-scan')){api('/api/schedule',{method:'POST',body:JSON.stringify({kind:'scan',action:'save',cron:$('#scan-cron').value})}).then(function(){notice('Scan schedule saved');return refresh()});return}if(e.target.closest('.save-delivery')){api('/api/schedule',{method:'POST',body:JSON.stringify({kind:'delivery',action:'save',interval_minutes:$('#delivery-interval').value,jira_status:$('#delivery-status').value})}).then(function(){notice('Delivery schedule saved');return refresh()});return}var prompt=e.target.closest('[data-prompt]');if(prompt){var p=prompt.dataset.prompt.split('/');selectedPrompt={mode:p.shift(),path:p.join('/'),key:prompt.dataset.prompt};renderPrompts();api('/api/prompt?mode='+encodeURIComponent(selectedPrompt.mode)+'&path='+encodeURIComponent(selectedPrompt.path)).then(function(v){$('#prompt-content').value=v.content}).catch(function(e){notice(e.message)});return}if(e.target.closest('.save-prompt')&&selectedPrompt){api('/api/prompt',{method:'POST',body:JSON.stringify({mode:selectedPrompt.mode,path:selectedPrompt.path,content:$('#prompt-content').value})}).then(function(){notice('Prompt saved locally')});return}if(e.target.closest('.save-workspace')){api('/api/workspace',{method:'POST',body:JSON.stringify({scan_window_days:$('#scan-window').value})}).then(function(){notice('Workspace configuration saved');return refresh()})}});
    if(data){renderAll();if(data.active_run)window.setInterval(refresh,30000)}else{$('#view-overview').innerHTML='<div class="panel"><div class="empty">Dashboard data is not available. Run <code>lumen dashboard</code> from an initialized workspace.</div></div>'}
    refresh();
  })();
  </script>
</body>
</html>
