<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="lumen-dashboard-version" content="4" />
  <title>Lumen Dashboard</title>
  <style>
    :root {
      --bg: #f4f4f2;
      --surface: #ffffff;
      --surface-muted: #fafafa;
      --border: #e8e8e6;
      --border-strong: #d8d8d4;
      --text: #1a1a18;
      --muted: #6b6b66;
      --subtle: #9b9b95;
      --accent: #2f6fed;
      --high: #d14343;
      --high-bg: #fdecec;
      --medium: #c47d15;
      --medium-bg: #fff6e8;
      --low: #3b82c4;
      --low-bg: #edf5ff;
      --success: #1f8a4c;
      --success-bg: #e8f7ee;
      --danger: #c0392b;
      --danger-bg: #fdecea;
      --accent-soft: #eef3ff;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 1px 2px rgba(16, 24, 40, 0.04), 0 4px 16px rgba(16, 24, 40, 0.04);
      --font: "SF Pro Text", "Segoe UI", system-ui, -apple-system, sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font);
      color: var(--text);
      background: var(--bg);
      line-height: 1.5;
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 24px 48px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    .topbar h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 650;
      letter-spacing: -0.02em;
    }

    .topbar .sub {
      margin-top: 4px;
      font-size: 13px;
      color: var(--muted);
    }

    .topbar-meta {
      text-align: right;
      font-size: 12px;
      color: var(--muted);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow);
    }

    .stat .label {
      font-size: 12px;
      color: var(--muted);
    }

    .stat .value {
      margin-top: 6px;
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 16px;
      overflow: hidden;
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }

    .card-head h2 {
      margin: 0;
      font-size: 15px;
      font-weight: 650;
    }

    .card-body { padding: 0 18px 16px; }

    .active-run {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      background: linear-gradient(180deg, #f7fbff 0%, #ffffff 100%);
      border-bottom: 1px solid var(--border);
    }

    .active-run-main {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .pulse {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 0 rgba(47, 111, 237, 0.45);
      animation: pulse 1.8s infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(47, 111, 237, 0.45); }
      70% { box-shadow: 0 0 0 10px rgba(47, 111, 237, 0); }
      100% { box-shadow: 0 0 0 0 rgba(47, 111, 237, 0); }
    }

    .active-run h3 {
      margin: 0;
      font-size: 14px;
      font-weight: 650;
    }

    .active-run p {
      margin: 2px 0 0;
      font-size: 12px;
      color: var(--muted);
    }

    .active-run-side {
      text-align: right;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .tabs {
      display: inline-flex;
      gap: 4px;
      padding: 3px;
      background: var(--surface-muted);
      border: 1px solid var(--border);
      border-radius: 999px;
    }

    .tabs button {
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 999px;
      cursor: pointer;
    }

    .tabs button.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th, td {
      padding: 12px 10px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    th {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--subtle);
      font-weight: 700;
      background: var(--surface-muted);
    }

    tbody tr:hover td { background: #fcfcfb; }
    tr:last-child td { border-bottom: none; }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .pill-success { background: var(--success-bg); color: var(--success); }
    .pill-failed { background: var(--danger-bg); color: var(--danger); }
    .pill-running { background: #eef3ff; color: var(--accent); }
    .pill-neutral { background: #f3f3f1; color: var(--muted); }
    .pill-high { background: var(--high-bg); color: var(--high); }
    .pill-medium { background: var(--medium-bg); color: var(--medium); }
    .pill-low { background: var(--low-bg); color: var(--low); }
    .pill-status { text-transform: capitalize; }
    .pill-open { background: var(--high-bg); color: var(--high); }
    .pill-in_progress { background: var(--accent-soft, #eef3ff); color: var(--accent); }
    .pill-pr_open { background: var(--medium-bg); color: var(--medium); }
    .pill-resolved { background: var(--success-bg); color: var(--success); }
    .pill-accepted_risk, .pill-false_positive, .pill-ignored { background: #f3f3f1; color: var(--muted); }

    .artifact-links { display: flex; flex-wrap: wrap; gap: 6px; }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 4px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid var(--border);
      background: var(--surface-muted);
      color: var(--text);
      text-decoration: none;
    }

    .chip:hover {
      border-color: var(--border-strong);
      text-decoration: none;
    }

    .chip.muted {
      color: var(--subtle);
      cursor: default;
    }

    .tools {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .tool-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 999px;
      background: #f3f3f1;
      border: 1px solid var(--border);
    }

    .trend-wrap { padding: 8px 0 4px; }

    .card-head-trend {
      align-items: flex-end;
    }

    .trend-head-main {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .trend-legend {
      padding: 0;
    }

    .trend-chart {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(72px, 1fr));
      gap: 12px;
      align-items: end;
      min-height: 180px;
      padding-top: 8px;
    }

    .trend-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .trend-bars {
      width: 100%;
      max-width: 56px;
      height: 120px;
      display: flex;
      flex-direction: column-reverse;
      border-radius: 8px;
      overflow: hidden;
      background: #f0f0ee;
      border: 1px solid var(--border);
    }

    .trend-seg { width: 100%; }
    .trend-seg.high { background: var(--high); }
    .trend-seg.medium { background: #e6a23c; }
    .trend-seg.low { background: var(--low); }

    .trend-meta {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      width: 100%;
      word-break: break-word;
    }

    .trend-total {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
    }

    .legend {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--muted);
      padding: 4px 0 0;
    }

    .legend i {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      margin-right: 5px;
      vertical-align: -1px;
    }

    .issue-list { padding-top: 8px; }

    .issue-item {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 10px;
      overflow: hidden;
      background: var(--surface);
    }

    .issue-item summary {
      list-style: none;
      cursor: pointer;
      padding: 12px 14px;
      display: grid;
      grid-template-columns: 72px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
    }

    .issue-severity {
      width: 72px;
      flex-shrink: 0;
    }

    .issue-head {
      min-width: 0;
    }

    .issue-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .issue-actions a {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.35;
      white-space: nowrap;
    }

    .issue-actions button {
      appearance: none;
      border: 1px solid #d8d8d4;
      background: #fff;
      color: var(--text);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
    }

    .issue-actions button:hover {
      background: #f7f7f5;
    }

    .issue-item summary::-webkit-details-marker { display: none; }

    .issue-title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.35;
    }

    .issue-meta {
      font-size: 12px;
      color: var(--muted);
    }

    .issue-meta-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }

    .issue-meta-row .pill {
      font-size: 11px;
      padding: 2px 8px;
    }

    .issue-detail {
      padding: 0 14px 14px;
      border-top: 1px solid var(--border);
      background: var(--surface-muted);
      font-size: 13px;
    }

    .issue-detail section {
      margin-top: 12px;
    }

    .issue-detail h4 {
      margin: 0 0 4px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--subtle);
    }

    .issue-detail p {
      margin: 0;
      color: var(--text);
      white-space: pre-wrap;
    }

    code {
      font-family: var(--mono);
      font-size: 12px;
      background: #f3f3f1;
      padding: 2px 6px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .empty {
      padding: 28px 18px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .empty strong {
      display: block;
      color: var(--text);
      margin-bottom: 6px;
    }

    .table-wrap { overflow-x: auto; }

    .refresh-note {
      font-size: 11px;
      color: var(--subtle);
    }

    @media (max-width: 900px) {
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .active-run { flex-direction: column; align-items: flex-start; }
      .active-run-side { text-align: left; }
    }

    @media (max-width: 640px) {
      .stats { grid-template-columns: 1fr; }
      .page { padding: 18px 14px 36px; }
    }
  </style>
</head>
<body>
  <div class="page" id="app">
    <div class="topbar">
      <div>
        <h1 id="page-title">Lumen</h1>
        <div class="sub" id="page-subtitle">Run History</div>
      </div>
      <div class="topbar-meta" id="meta"></div>
    </div>
    <div id="content"></div>
  </div>
  <script src="dashboard-data.js"></script>
  <script>
    (function () {
      var data = window.DASHBOARD_DATA;

      function esc(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function formatTime(value) {
        if (!value) return "—";
        var date = new Date(value);
        if (isNaN(date.getTime())) return esc(value);
        return date.toLocaleString(undefined, {
          month: "short",
          day: "numeric",
          hour: "numeric",
          minute: "2-digit"
        });
      }

      function statusPill(status, running) {
        if (running) return '<span class="pill pill-running">Running</span>';
        if (status === "failed") return '<span class="pill pill-failed">Failed</span>';
        if (status === "completed_clean" || status === "completed_with_findings") {
          return '<span class="pill pill-success">Succeeded</span>';
        }
        return '<span class="pill pill-neutral">' + esc(status || "—") + "</span>";
      }

      function severityPill(value) {
        var key = String(value || "").toLowerCase();
        if (!key) return "";
        return '<span class="pill pill-' + key + '">' + esc(value) + "</span>";
      }

      function formatIssueStatus(status) {
        return String(status || "unknown").replace(/_/g, " ");
      }

      function issueStatusPill(status) {
        var key = String(status || "unknown").replace(/\s+/g, "_");
        return '<span class="pill pill-status pill-' + key + '">' + esc(formatIssueStatus(status)) + "</span>";
      }

      function link(href, label) {
        if (!href) return "";
        return '<a href="' + esc(href) + '" target="_blank" rel="noopener">' + esc(label) + "</a>";
      }

      function artifactLinks(run) {
        var parts = [];
        if (run.html) parts.push('<a class="chip" href="' + esc(run.html) + '" target="_blank" rel="noopener">HTML</a>');
        if (run.pdf) parts.push('<a class="chip" href="' + esc(run.pdf) + '" target="_blank" rel="noopener">PDF</a>');
        else if (run.html && run.report_status === "pdf_failed") {
          parts.push('<span class="chip muted" title="PDF export failed">PDF n/a</span>');
        }
        return parts.length ? '<span class="artifact-links">' + parts.join("") + "</span>" : "—";
      }

      function renderStats(stats) {
        stats = stats || {};
        return (
          '<div class="stats">' +
          '<div class="stat"><div class="label">Successful · 24h</div><div class="value">' + (stats.success_24h || 0) + "</div></div>" +
          '<div class="stat"><div class="label">Failed · 24h</div><div class="value">' + (stats.failed_24h || 0) + "</div></div>" +
          '<div class="stat"><div class="label">Successful · 7d</div><div class="value">' + (stats.success_7d || 0) + "</div></div>" +
          '<div class="stat"><div class="label">Failed · 7d</div><div class="value">' + (stats.failed_7d || 0) + "</div></div>" +
          "</div>"
        );
      }

      function renderActiveRun(active) {
        if (!active) return "";
        return (
          '<div class="card">' +
          '<div class="active-run">' +
          '<div class="active-run-main">' +
          '<div class="pulse"></div>' +
          "<div>" +
          "<h3>Scan in progress</h3>" +
          "<p>Phase: <strong>" + esc(active.phase || "Running") + "</strong></p>" +
          "</div></div>" +
          '<div class="active-run-side">' +
          "<div>Started " + formatTime(active.started_at) + "</div>" +
          "<div>Elapsed " + esc(active.elapsed || "—") + "</div>" +
          (active.log ? '<div>' + link(active.log, "View log") + "</div>" : "") +
          '<div class="refresh-note">Auto-refreshing every 30s</div>' +
          "</div></div></div>"
        );
      }

      function renderTrendLegend() {
        return (
          '<div class="legend trend-legend">' +
          '<span><i style="background:var(--high)"></i>High</span>' +
          '<span><i style="background:#e6a23c"></i>Medium</span>' +
          '<span><i style="background:var(--low)"></i>Low</span>' +
          "</div>"
        );
      }

      function renderTrend(points) {
        if (!points || !points.length) {
          return '<div class="empty">No runs to chart yet.</div>';
        }
        var maxTotal = Math.max.apply(null, points.map(function (p) { return p.total || 0; }).concat([1]));
        var cols = points.map(function (point) {
          var scale = 110 / maxTotal;
          var highH = Math.max(point.high ? 4 : 0, Math.round(point.high * scale));
          var mediumH = Math.max(point.medium ? 4 : 0, Math.round(point.medium * scale));
          var lowH = Math.max(point.low ? 4 : 0, Math.round(point.low * scale));
          return (
            '<div class="trend-col">' +
            '<div class="trend-total">' + (point.total || 0) + "</div>" +
            '<div class="trend-bars">' +
            (point.low ? '<div class="trend-seg low" style="height:' + lowH + 'px"></div>' : "") +
            (point.medium ? '<div class="trend-seg medium" style="height:' + mediumH + 'px"></div>' : "") +
            (point.high ? '<div class="trend-seg high" style="height:' + highH + 'px"></div>' : "") +
            "</div>" +
            '<div class="trend-meta">' + esc(point.label || "") + "</div>" +
            "</div>"
          );
        }).join("");
        return '<div class="trend-chart">' + cols + "</div>";
      }

      function parseTime(value) {
        if (!value) return null;
        var normalized = String(value);
        if (normalized.endsWith("Z")) {
          normalized = normalized.slice(0, -1) + "+00:00";
        }
        var parsed = new Date(normalized);
        return isNaN(parsed.getTime()) ? null : parsed;
      }

      function daysSince(value) {
        var parsed = parseTime(value);
        if (!parsed) return null;
        return (Date.now() - parsed.getTime()) / 86400000;
      }

      function ignoreIssue(issueId, workspaceRoot) {
        var cmd = "lumen issue ignore " + issueId + " --workspace " + JSON.stringify(workspaceRoot);
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(cmd).then(function () {
            window.alert(
              "Copied command to clipboard:\n\n" + cmd +
              "\n\nRun it in a terminal to persist the ignore, then refresh the dashboard."
            );
          });
          return;
        }
        window.prompt("Run this command to ignore the finding:", cmd);
      }

      function renderIssueItem(issue, workspaceRoot) {
        var links = [];
        if (issue.pr_url) links.push(link(issue.pr_url, "View Pull Request"));
        if (issue.jira_url) links.push(link(issue.jira_url, issue.jira_key || "View Jira"));
        var ignoreButton = "";
        if (issue.status !== "ignored" && issue.status !== "resolved") {
          ignoreButton = '<button type="button" class="ignore-btn" data-issue-id="' + esc(issue.id) + '">Ignore</button>';
        }
        return (
          '<details class="issue-item">' +
          "<summary>" +
          '<div class="issue-severity">' + severityPill(issue.severity) + "</div>" +
          '<div class="issue-head">' +
          '<div class="issue-title">' + esc(issue.title) + "</div>" +
          '<div class="issue-meta-row">' +
          '<span class="issue-meta">' + esc(issue.repository) + " · last seen " + formatTime(issue.last_seen_at) +
          (issue.stale ? " · stale" : "") + "</span>" +
          issueStatusPill(issue.status) +
          "</div>" +
          "</div>" +
          '<div class="issue-actions">' +
          ignoreButton +
          (links.length ? links.join(" ") : "") +
          "</div>" +
          "</summary>" +
          '<div class="issue-detail">' +
          "<section><h4>Location</h4><p><code>" + esc(issue.file) + "</code> " + esc(issue.line_range || "") + "</p></section>" +
          (issue.impact ? "<section><h4>Impact</h4><p>" + esc(issue.impact) + "</p></section>" : "") +
          (issue.trigger ? "<section><h4>Trigger</h4><p>" + esc(issue.trigger) + "</p></section>" : "") +
          (issue.root_cause ? "<section><h4>Root cause</h4><p>" + esc(issue.root_cause) + "</p></section>" : "") +
          (issue.suggestion ? "<section><h4>Suggestion</h4><p>" + esc(issue.suggestion) + "</p></section>" : "") +
          (issue.validation ? "<section><h4>Validation</h4><p>" + esc(issue.validation) + "</p></section>" : "") +
          (issue.resolution_reason ? "<section><h4>Resolution</h4><p>" + esc(issue.resolution_reason) + (issue.resolved_at ? " · " + formatTime(issue.resolved_at) : "") + "</p></section>" : "") +
          "</div></details>"
        );
      }

      function filterIssues(issues, mode, scanWindowDays) {
        if (mode === "open") {
          return (issues || []).filter(function (issue) {
            if (["open", "in_progress", "pr_open"].indexOf(issue.status) < 0) return false;
            if (issue.stale) return false;
            var age = daysSince(issue.first_seen_at);
            if (age !== null && age > scanWindowDays) return false;
            return true;
          });
        }
        if (mode === "ignored") {
          return (issues || []).filter(function (issue) {
            return issue.status === "ignored";
          });
        }
        if (mode === "resolved") {
          return (issues || []).filter(function (issue) {
            return ["resolved", "accepted_risk", "false_positive"].indexOf(issue.status) >= 0;
          });
        }
        return issues || [];
      }

      function renderIssues(issues, mode, scanWindowDays) {
        var filtered = filterIssues(issues, mode, scanWindowDays);
        if (!filtered.length) {
          return '<div class="empty">No issues in this view.</div>';
        }
        return '<div class="issue-list">' + filtered.map(function (issue) {
          return renderIssueItem(issue, data.workspace_root || "");
        }).join("") + "</div>";
      }

      function renderRunTools(run) {
        var tags = [];
        if (run.repos) tags.push('<span class="tool-tag">' + run.repos + " repos</span>");
        if (run.prs) tags.push('<span class="tool-tag">' + run.prs + " PRs</span>");
        if (run.high) tags.push('<span class="tool-tag">' + run.high + " High</span>");
        return tags.length ? '<div class="tools">' + tags.join("") + "</div>" : "—";
      }

      function renderRunsTable(runs, projectName, activeRun) {
        var rows = [];
        if (activeRun) {
          rows.push(
            "<tr>" +
            "<td><strong>" + esc(projectName || "Code scan") + "</strong></td>" +
            "<td>" + formatTime(activeRun.started_at) + "</td>" +
            "<td><span class=" + '"tool-tag"' + ">Agent</span></td>" +
            "<td>" + statusPill("", true) + "</td>" +
            "<td>" + esc(activeRun.elapsed || "—") + "</td>" +
            "<td>" + (activeRun.log ? link(activeRun.log, "Log") : "—") + "</td>" +
            "</tr>"
          );
        }
        if (runs && runs.length) {
          rows = rows.concat(runs.map(function (run) {
            return (
              "<tr>" +
              "<td><strong>" + esc(projectName || "Code scan") + "</strong></td>" +
              "<td>" + formatTime(run.finished_at || run.started_at) + "</td>" +
              "<td>" + renderRunTools(run) + "</td>" +
              "<td>" + statusPill(run.status, false) + "</td>" +
              "<td>" + esc(run.duration || "—") + "</td>" +
              "<td>" + artifactLinks(run) + "</td>" +
              "</tr>"
            );
          }));
        }
        if (!rows.length) {
          return '<div class="empty">No runs yet. Start one with <code>lumen scan --project &lt;slug&gt;</code>.</div>';
        }
        return (
          '<div class="table-wrap"><table>' +
          "<thead><tr><th>Automation</th><th>Triggered</th><th>Findings</th><th>Status</th><th>Duration</th><th>Artifacts</th></tr></thead>" +
          "<tbody>" + rows.join("") + "</tbody></table></div>"
        );
      }

      function renderEmpty() {
        document.getElementById("content").innerHTML =
          '<div class="card"><div class="empty">' +
          "<strong>No dashboard data yet</strong>" +
          "Run a Lumen scan first. <code>dashboard-data.js</code> is refreshed automatically at the end of each scan." +
          "</div></div>";
      }

      if (!data) {
        renderEmpty();
        return;
      }

      var projectName = (data.project && data.project.display_name) || (data.config && data.config.project && data.config.project.display_name) || "Code scan";
      var runs = data.runs || [];
      var issues = data.issues || [];
      var activeRun = data.active_run || null;
      var issueMode = "open";
      var scanWindowDays = data.scan_window_days || ((data.config && data.config.execution && data.config.execution.scan_window_days) || 7);
      var workspaceRoot = data.workspace_root || "";

      document.getElementById("page-title").textContent = (data.product && data.product.name) || "Lumen";
      document.getElementById("page-subtitle").textContent = "Run History";
      document.getElementById("meta").innerHTML =
        "<div><strong>" + esc(projectName) + "</strong></div>" +
        "<div>Updated " + formatTime(data.generated_at) + "</div>";

      function renderAll() {
        document.getElementById("content").innerHTML =
          renderStats(data.run_stats) +
          renderActiveRun(activeRun) +
          '<div class="card"><div class="card-head"><h2>Scan Runs</h2></div><div class="card-body">' +
          renderRunsTable(runs, projectName, activeRun) +
          "</div></div>" +
          '<div class="card"><div class="card-head"><h2>Tracked Issues</h2>' +
          '<div class="tabs" id="issue-tabs">' +
          '<button type="button" data-mode="open" class="active">Open</button>' +
          '<button type="button" data-mode="all">All</button>' +
          '<button type="button" data-mode="ignored">Ignored</button>' +
          '<button type="button" data-mode="resolved">Resolved</button>' +
          "</div></div>" +
          '<div class="card-body"><div class="refresh-note">Open view respects scan window (' + esc(String(scanWindowDays)) + ' days).</div>' +
          '<div id="issue-panel">' + renderIssues(issues, issueMode, scanWindowDays) + "</div></div></div>" +
          '<div class="card"><div class="card-head card-head-trend">' +
          '<div class="trend-head-main"><h2>Finding Trend</h2>' + renderTrendLegend() + "</div>" +
          '<span class="refresh-note">Last ' + ((data.trend || []).length || 0) + " runs</span></div>" +
          '<div class="card-body trend-wrap">' + renderTrend(data.trend || []) + "</div></div>";
      }

      renderAll();

      document.getElementById("content").addEventListener("click", function (event) {
        var ignoreBtn = event.target.closest(".ignore-btn");
        if (ignoreBtn) {
          event.preventDefault();
          event.stopPropagation();
          ignoreIssue(ignoreBtn.getAttribute("data-issue-id"), workspaceRoot);
          return;
        }
        var button = event.target.closest("#issue-tabs button");
        if (!button) return;
        issueMode = button.getAttribute("data-mode") || "open";
        document.querySelectorAll("#issue-tabs button").forEach(function (node) {
          node.classList.toggle("active", node === button);
        });
        document.getElementById("issue-panel").innerHTML = renderIssues(issues, issueMode, scanWindowDays);
      });

      if (activeRun) {
        window.setInterval(function () {
          window.location.reload();
        }, 30000);
      }
    })();
  </script>
</body>
</html>
